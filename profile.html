<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>User Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">

</head>

<body>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-8 col-lg-7">

            <div class="card shadow">

                <div class="card-body p-5">

                    <h2 class="text-center mb-4">
                        User Profile
                    </h2>

                    <form id="profileForm">

                        <div class="mb-3">
                            <label>Email</label>
                            <input
                                type="email"
                                id="email"
                                class="form-control"
                                readonly>
                        </div>

                        <div class="mb-3">
                            <label>Name</label>
                            <input
                                type="text"
                                id="name"
                                name="name"
                                class="form-control">
                        </div>

                        <div class="mb-3">
                            <label>Age</label>
                            <input
                                type="number"
                                id="age"
                                name="age"
                                class="form-control">
                        </div>

                        <div class="mb-3">
                            <label>Date of Birth</label>
                            <input
                                type="date"
                                id="dob"
                                name="dob"
                                class="form-control">
                        </div>

                        <div class="mb-3">
                            <label>Contact</label>
                            <input
                                type="text"
                                id="contact"
                                name="contact"
                                class="form-control">
                        </div>

                        <button
                            type="submit"
                            class="btn btn-primary w-100">
                            Save Profile
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="assets/js/profile.js"></script>

</body>
</html>
